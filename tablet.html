<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tablet Control - Debug</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; padding: 15px; }
        .info-bar { background: #333; color: #fff; padding: 10px; font-size: 13px; border-radius: 8px; margin-bottom: 15px; }
        .add-panel { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; gap: 10px; }
        .add-panel input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .v-wrap { background: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; background: #222; }
        .pc-header { padding: 10px; font-weight: bold; background: #f8f8f8; display: flex; justify-content: space-between; }
        .status-tag { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #999; color: #fff; }
        .online { background: #28a745; }
        .log-box { height: 60px; overflow-y: auto; font-size: 11px; padding: 8px; background: #fafafa; border-top: 1px solid #eee; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #fff; background: #007bff; }
    </style>
</head>
<body>

    <div class="info-bar" id="stat">タブレットID: 準備中...</div>

    <div class="add-panel">
        <input type="text" id="target-id" placeholder="PCの名前 (例: pc-001)">
        <button onclick="addNewMonitor()">追加</button>
    </div>

    <div id="grid"></div>

    <script>
    const peer = new Peer('tablet-master');
    let pcStreams = {}, connections = {}, localStream;
    let savedPCs = JSON.parse(localStorage.getItem('my_monitors') || "[]");

    // 自分の状態表示
    peer.on('open', id => { document.getElementById('stat').innerText = "あなたのID: " + id + " (オンライン)"; });
    peer.on('error', err => { console.error(err); document.getElementById('stat').innerText = "エラー: " + err.type; });

    // 起動時に保存リストを復元
    window.onload = () => {
        savedPCs.forEach(id => {
            createCardUI(id);
            setTimeout(() => startConnect(id), 2000);
        });
    };

    // マイク準備（カメラ・マイクがなくてもエラーにしない）
    navigator.mediaDevices.getUserMedia({video:false, audio:true})
        .then(s => { localStream = s; localStream.getAudioTracks()[0].enabled = false; })
        .catch(e => { console.warn("マイクなしで動作します"); localStream = new MediaStream(); });

    function addNewMonitor() {
        const id = document.getElementById('target-id').value.trim();
        if (!id || savedPCs.includes(id)) return;
        savedPCs.push(id);
        localStorage.setItem('my_monitors', JSON.stringify(savedPCs));
        createCardUI(id);
        startConnect(id);
        document.getElementById('target-id').value = "";
    }

    function createCardUI(id) {
        if (document.getElementById(`card-${id}`)) return;
        const grid = document.getElementById('grid');
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div class="pc-header">
                <span>Unit: ${id} <span id="tag-${id}" class="status-tag">待機中</span></span>
                <button onclick="removeCard('${id}')" style="background:none; color:#ccc;">✕</button>
            </div>
            <div class="v-wrap">
                <video id="video-${id}" autoplay playsinline></video>
            </div>
            <div id="log-${id}" class="log-box">接続を試みます...</div>
            <div style="padding:10px; display:grid; gap:5px;">
                <button onclick="startConnect('${id}')">再接続・映像要求</button>
                <button style="background:#28a745;" onclick="sendVoice('${id}')">呼びかけ(TTS)</button>
            </div>
        `;
        grid.appendChild(card);
    }

    function startConnect(id) {
        const log = document.getElementById(`log-${id}`);
        const tag = document.getElementById(`tag-${id}`);
        log.innerText = "接続要求を送信中...";

        // 1. 映像を要求（Call）
        const call = peer.call(id, localStream);
        
        call.on('stream', s => {
            log.innerText = "映像を受信しました！";
            tag.innerText = "通信中";
            tag.className = "status-tag online";
            const v = document.getElementById(`video-${id}`);
            v.srcObject = s;
            v.play().catch(e => log.innerText = "再生エラー: クリックしてください");
            pcStreams[id] = s;
        });

        // 2. データ接続（Command）
        const conn = peer.connect(id);
        connections[id] = conn;
        conn.on('open', () => { log.innerText += "\nデータ通信 OK"; });
        
        // エラー時の自動リトライ
        call.on('error', () => { setTimeout(() => startConnect(id), 10000); });
    }

    function sendVoice(id) {
        const msg = prompt("PCに喋らせる内容を入力:");
        if (msg && connections[id]) connections[id].send(msg);
    }

    function removeCard(id) {
        if(confirm("削除しますか？")) {
            savedPCs = savedPCs.filter(p => p !== id);
            localStorage.setItem('my_monitors', JSON.stringify(savedPCs));
            document.getElementById(`card-${id}`).remove();
        }
    }
    </script>
</body>
</html>
