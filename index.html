<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neda Lab - Multi-Camera System</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; }
        .mode-select { display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 90vh; }
        .btn-large { padding: 25px 50px; font-size: 20px; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; color: white; }
        
        /* モニター（親機）のレイアウト */
        #monitor-ui { display: none; }
        .camera-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; padding: 10px; }
        .camera-card { background: #1e1e1e; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .video-wrap { position: relative; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .cam-label { position: absolute; top: 10px; left: 10px; background: rgba(0,209,178,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        .log-area { height: 100px; overflow-y: auto; font-size: 12px; padding: 10px; background: #000; color: #00d1b2; font-family: monospace; border-top: 1px solid #333; }
        .controls { padding: 10px; display: flex; gap: 5px; background: #222; }

        /* カメラ（子機）のレイアウト */
        #camera-ui { display: none; text-align: center; padding-top: 50px; }
        .status-badge { padding: 10px; border-radius: 8px; margin-bottom: 20px; display: inline-block; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; width: 80%; max-width: 300px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="mode-select" class="mode-select">
        <h1>Neda Lab Network</h1>
        <button class="btn-large" style="background: #007bff;" onclick="initMonitor()">🖥️ モニター (親機) を起動</button>
        <button class="btn-large" style="background: #00d1b2;" onclick="initCamera()">📷 カメラ (子機) を追加</button>
    </div>

    <div id="monitor-ui">
        <h2 style="text-align:center; color:#00d1b2;">Lab Central Monitor</h2>
        <div id="cameraGrid" class="camera-grid"></div>
    </div>

    <div id="camera-ui">
        <div id="cam-status" class="status-badge" style="background:#444;">未接続</div><br>
        <input type="text" id="cam-name" placeholder="カメラ名 (例: 蒸留器前)"><br>
        <button class="btn-large" style="background:#00d1b2;" onclick="startCameraStreaming()">配信開始</button>
        <div style="margin-top:20px;">
            <video id="camPreview" autoplay playsinline muted style="width:300px; border:2px solid #333; border-radius:10px;"></video>
        </div>
    </div>

    <script>
    const MONITOR_ID = 'ryukon-central-monitor'; // 親機の固定ID
    let peer, localStream;

    // --- モニター（親機）側ロジック ---
    function initMonitor() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';
        peer = new Peer(MONITOR_ID);

        peer.on('open', () => console.log('Monitor Ready'));

        // カメラ（子機）からの着信を受け取る
        peer.on('call', call => {
            call.answer(null);
            call.on('stream', stream => {
                addCameraCard(call.peer, stream, call.metadata?.name || "Unknown Cam");
            });
        });

        // 読み上げやログデータの受信
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(data.type === 'LOG') {
                    const logBox = document.getElementById(`log-${conn.peer}`);
                    if(logBox) logBox.innerHTML = `<div>${data.data}</div>` + logBox.innerHTML;
                }
                if(data.type === 'TTS') { // カメラ側から読み上げ要求があれば実行
                    const uttr = new SpeechSynthesisUtterance(data.text);
                    uttr.lang = 'ja-JP';
                    window.speechSynthesis.speak(uttr);
                }
            });
        });
    }

    function addCameraCard(id, stream, name) {
        if(document.getElementById(`card-${id}`)) return;
        const grid = document.getElementById('cameraGrid');
        const card = document.createElement('div');
        card.className = 'camera-card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div class="video-wrap">
                <span class="cam-label">${name}</span>
                <video id="v-${id}" autoplay playsinline muted></video>
            </div>
            <div class="controls">
                <button onclick="document.getElementById('v-${id}').muted = false">🔊 音声</button>
                <button onclick="sendTTS('${id}')">💬 読み上げ送信</button>
            </div>
            <div class="log-area" id="log-${id}"></div>
        `;
        grid.appendChild(card);
        document.getElementById(`v-${id}`).srcObject = stream;
    }

    function sendTTS(id) {
        const text = prompt("カメラ側のスピーカーで喋らせる内容:");
        if(text) {
            const conn = peer.connect(id);
            conn.on('open', () => conn.send({type: 'TTS_CMD', text: text}));
        }
    }

    // --- カメラ（子機）側ロジック ---
    function initCamera() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('camera-ui').style.display = 'block';
        peer = new Peer(); // ランダムID
    }

    async function startCameraStreaming() {
        const name = document.getElementById('cam-name').value || "Unnamed Cam";
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { width: 640 }, audio: true
        });
        document.getElementById('camPreview').srcObject = localStream;

        // モニターに発信（名前をメタデータで送る）
        const call = peer.call(MONITOR_ID, localStream, {metadata: {name: name}});
        
        // モニターとのデータライン確立
        const conn = peer.connect(MONITOR_ID);
        
        conn.on('open', () => {
            document.getElementById('cam-status').innerText = "配信中: " + name;
            document.getElementById('cam-status').style.background = "#28a745";
            
            // 動体検知ロジック（そのまま移植）
            startMotionSensor(conn);
        });

        // モニターからの読み上げ命令を受信
        peer.on('connection', c => {
            c.on('data', data => {
                if(data.type === 'TTS_CMD') {
                    const uttr = new SpeechSynthesisUtterance(data.text);
                    uttr.lang = 'ja-JP';
                    window.speechSynthesis.speak(uttr);
                }
            });
        });
    }

    function startMotionSensor(conn) {
        const video = document.getElementById('camPreview');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', {willReadFrequently:true});
        let prev = null;
        setInterval(() => {
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const curr = ctx.getImageData(0, 0, 64, 48);
            let diff = 0;
            if(prev) {
                for(let i=0; i<curr.data.length; i+=4) diff += Math.abs(curr.data[i]-prev.data[i]);
            }
            prev = curr;
            if(diff > 30000) {
                conn.send({type: 'LOG', data: `● ${new Date().toLocaleTimeString()} 動き検知`});
            }
        }, 500);
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('video').forEach(v => v.play().catch(()=>{}));
    });
    </script>
</body>
</html>
