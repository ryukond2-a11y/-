<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neda Lab - Logic Synced All-in-One</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        /* 共通スタイル */
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .mode-select { display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 90vh; }
        .btn-large { padding: 25px 50px; font-size: 20px; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .pc-btn { background: #00d1b2; }
        .mobile-btn { background: #007bff; }
        
        /* PC用スタイル（提供コード準拠） */
        #pc-ui, #mobile-ui { display: none; width: 100%; max-width: 1200px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        .video-box { flex: 2; min-width: 320px; max-width: 800px; position: relative; }
        video { width: 100%; border-radius: 12px; background: #000; border: 2px solid #00d1b2; }
        .log-box { flex: 1; min-width: 300px; height: 500px; background: #1e1e1e; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; border: 1px solid #333; }
        .log-list { flex-grow: 1; overflow-y: auto; font-size: 14px; border-top: 1px solid #333; margin-top: 15px; padding-top: 10px; }
        #status-bar { margin-bottom: 15px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        #status { color: #00d1b2; font-weight: bold; }
        #motion-dot { width: 14px; height: 14px; border-radius: 50%; background: #444; }
        #motion-dot.active { background: #ff4d4d; box-shadow: 0 0 15px #ff4d4d; }
        button { background: #444; color: #ccc; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

        /* Mobile用スタイル（提供コード準拠） */
        #conn-status { width: 100%; padding: 10px 0; margin-bottom: 10px; border-radius: 8px; font-weight: bold; background: #dc3545; color: white; text-align: center; }
        #conn-status.online { background: #28a745; }
        .mobile-v-container { width: 100%; background: #000; border-radius: 10px; aspect-ratio: 16/9; overflow: hidden; position: relative; border: 2px solid #333; }
        #mobileLog { background: #222; color: #00d1b2; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; margin: 10px 0; padding: 10px; border-radius: 8px; text-align: left; }
        .btn-main { background: #007bff; color: white; width: 100%; padding: 15px; margin: 5px 0; }
        .btn-mic { background: #6c757d; color: white; width: 100%; padding: 15px; margin: 5px 0; }
        .btn-mic.active { background: #dc3545; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; background: #333; color: white; }
    </style>
</head>
<body>

    <div id="mode-select" class="mode-select">
        <h1>Neda Lab Master</h1>
        <button class="btn-large pc-btn" onclick="initPC()">💻 PC (親機) として起動</button>
        <button class="btn-large mobile-btn" onclick="initMobile()">📱 スマホ (子機) として起動</button>
    </div>

    <div id="pc-ui">
        <div id="status-bar"><div id="motion-dot"></div><span>状態: <span id="status">起動中...</span></span></div>
        <div class="container">
            <div class="video-box"><video id="localVideo" autoplay playsinline muted></video><canvas id="motionCanvas" style="display:none;"></canvas></div>
            <div class="log-box">
                <strong>動体検知ログ</strong>
                <div id="logList" class="log-list"></div>
                <button onclick="document.getElementById('logList').innerHTML=''">ログ削除</button>
            </div>
        </div>
    </div>

    <div id="mobile-ui">
        <div id="conn-status">未接続</div>
        <div class="mobile-v-container"><video id="remoteVideo" autoplay playsinline muted></video></div>
        <div id="mobileLog">通知待機中...</div>
        <button id="recSettingBtn" style="background:#444;" onclick="toggleRecSetting()">自動録画: OFF</button>
        <button id="micBtn" class="btn-mic" onclick="toggleMic()">1. マイク準備 (信号開始)</button>
        <button class="btn-main" onclick="startConnection()">2. PCに接続開始</button>
        <input type="text" id="tts-text" placeholder="読み上げ文字">
        <button onclick="sendText()" style="background: #28a745; width:100%; color:white; padding:15px; border-radius:8px;">送信</button>
    </div>

    <div id="audio-container"></div>

    <script>
    const MASTER_ID = 'pc-monitor-001';
    let peer, localStream, connections = [];

    // --- PC (Base Station) ロジック ---
    function initPC() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('pc-ui').style.display = 'block';
        
        peer = new Peer(MASTER_ID);
        const video = document.getElementById('localVideo');
        const logList = document.getElementById('logList');
        const motionDot = document.getElementById('motion-dot');
        const canvas = document.getElementById('motionCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let prevFrame = null, lastDetectedTime = 0;

        peer.on("open", id => { document.getElementById('status').innerText = "接続待機中..."; });

        navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: { echoCancellation: true, autoGainControl: true, noiseSuppression: true }
        }).then(stream => {
            localStream = stream;
            video.srcObject = stream;
            setInterval(() => {
                if (!video.videoWidth) return;
                canvas.width = 64; canvas.height = 48;
                ctx.drawImage(video, 0, 0, 64, 48);
                const currFrame = ctx.getImageData(0, 0, 64, 48);
                let diff = 0;
                if (prevFrame) {
                    for (let i = 0; i < currFrame.data.length; i += 4) {
                        diff += Math.abs(currFrame.data[i] - prevFrame.data[i]);
                    }
                }
                prevFrame = currFrame;
                if (diff > 30000) {
                    const now = new Date();
                    if (now.getTime() - lastDetectedTime > 5000) {
                        const timeStr = now.toLocaleTimeString('ja-JP');
                        const item = document.createElement('div');
                        item.style.color = "#00d1b2";
                        item.innerText = `● ${timeStr} 動きを検知`;
                        logList.insertBefore(item, logList.firstChild);
                        connections.forEach(conn => {
                            if (conn.open) conn.send({ type: 'LOG', data: timeStr + " 動き検知" });
                        });
                        lastDetectedTime = now.getTime();
                    }
                    motionDot.classList.add('active');
                    setTimeout(() => motionDot.classList.remove('active'), 500);
                }
            }, 500);

            peer.on('call', call => {
                call.answer(null); 
                call.on('stream', remoteStream => {
                    const oldAudio = document.getElementById('remoteAudio-' + call.peer);
                    if (oldAudio) oldAudio.remove();
                    const audio = document.createElement('audio');
                    audio.id = 'remoteAudio-' + call.peer;
                    audio.srcObject = remoteStream;
                    audio.autoplay = true;
                    document.getElementById('audio-container').appendChild(audio);
                });
            });

            peer.on('connection', conn => {
                conn.on("open", () => {
                    connections.push(conn);
                    document.getElementById('status').innerText = `スマホ接続中 (${connections.length}台)`;
                    peer.call(conn.peer, localStream);
                });
                conn.on('data', data => {
                    if (typeof data === 'string') {
                        const uttr = new SpeechSynthesisUtterance(data);
                        uttr.lang = 'ja-JP';
                        window.speechSynthesis.speak(uttr);
                    }
                });
            });
        });
    }

    // --- Mobile (Control) ロジック ---
    let conn = null, isMicOn = false, autoRecord = false, isRecording = false;

    function initMobile() {
        document.getElementById('mode-select').style.display = 'none';
        document.getElementById('mobile-ui').style.display = 'block';
        peer = new Peer();
    }

    function toggleRecSetting() {
        autoRecord = !autoRecord;
        const btn = document.getElementById('recSettingBtn');
        btn.innerText = autoRecord ? "自動録画: ON (1分間)" : "自動録画: OFF";
        btn.style.background = autoRecord ? "#28a745" : "#444";
    }

    async function toggleMic() {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, autoGainControl: true, noiseSuppression: true } 
                });
            } catch (e) { alert("マイク許可失敗"); return; }
        }
        isMicOn = !isMicOn;
        localStream.getAudioTracks()[0].enabled = isMicOn;
        if (isMicOn) peer.call(MASTER_ID, localStream);
        const btn = document.getElementById('micBtn');
        btn.innerText = isMicOn ? "1. マイク信号: 送信中" : "1. マイク準備: OFF";
        btn.classList.toggle('active', isMicOn);
    }

    function startConnection() {
        conn = peer.connect(MASTER_ID);
        conn.on('data', data => {
            if (data.type === 'LOG') {
                const logEl = document.getElementById('mobileLog');
                logEl.innerHTML = `<div>● ${data.data}</div>` + logEl.innerHTML;
                if (autoRecord && window.remoteStream) startRecording(window.remoteStream);
            }
        });
        peer.on('call', call => {
            call.answer(null); 
            call.on('stream', stream => {
                if (stream.getVideoTracks().length > 0) {
                    const v = document.getElementById('remoteVideo');
                    v.srcObject = stream;
                    window.remoteStream = stream;
                    document.getElementById('conn-status').innerText = "接続中";
                    document.getElementById('conn-status').className = "online";
                } 
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                document.getElementById('audio-container').appendChild(audio);
            });
        });
    }

    function startRecording(stream) {
        if (isRecording) return; isRecording = true;
        let chunks = [];
        const mr = new MediaRecorder(stream, { mimeType: 'video/webm' });
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks)); 
            a.download = `rec_${Date.now()}.webm`; a.click();
            isRecording = false;
        };
        mr.start(); setTimeout(() => { if(mr.state !== "inactive") mr.stop(); }, 60000);
    }

    function sendText() {
        const txt = document.getElementById('tts-text').value;
        if (conn && conn.open) { conn.send(txt); document.getElementById('tts-text').value = ""; }
    }

    // クリックで音声をアンブロック
    document.addEventListener('click', () => {
        const audios = document.querySelectorAll('audio');
        audios.forEach(a => a.play().catch(()=>{}));
    });
    </script>
</body>
</html>
