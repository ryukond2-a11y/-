<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveillance System - Multi Camera</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --panel: #ffffff;
            --primary: #00d1b2;
            --text: #2d3436;
            --accent-red: #ff7675;
            --border: #e1e4e8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 初期設定画面 */
        #setup-screen {
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            width: 350px;
            transition: 0.5s;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #636e72; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* メインUI */
        #main-app { display: none; width: 100vw; height: 100vh; flex-direction: column; }

        header {
            background: #fff;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .layout { display: flex; flex: 1; overflow: hidden; }

        /* 映像エリア */
        .viewport { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .main-screen {
            flex: 1;
            background: #000;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #main-video { width: 100%; height: 100%; object-fit: contain; }

        /* サムネイルリスト */
        .thumb-list {
            height: 120px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px;
        }
        .thumb-card {
            min-width: 160px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .thumb-card.active { border-color: var(--primary); }
        .thumb-card video { width: 100%; height: 75px; object-fit: cover; background: #000; }
        .thumb-name { font-size: 0.75rem; text-align: center; padding: 5px; font-weight: bold; }

        /* サイドバー */
        aside {
            width: 320px;
            background: #fff;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .status-box {
            padding: 15px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .indicator { width: 8px; height: 8px; border-radius: 50%; background: #bdc3c7; }
        .indicator.on { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        .indicator.alert { background: var(--accent-red); animation: blink 0.8s infinite; }

        #log-box {
            flex: 1;
            font-size: 0.8rem;
            background: #fafafa;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        @keyframes blink { 50% { opacity: 0.3; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="margin-bottom: 30px;">Surveillance</h2>
    
    <div id="setup-master">
        <button class="btn btn-primary" onclick="launch('master')">モニター（親機）を起動</button>
    </div>
    
    <div style="margin: 20px 0; color: #ccc;">OR</div>

    <div id="setup-camera">
        <div class="input-group">
            <label>カメラ名（例：玄関、赤ちゃん部屋）</label>
            <input type="text" id="cam-name-input" placeholder="名前を入力...">
        </div>
        <button class="btn btn-outline" onclick="launch('camera')">カメラとして接続</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div style="font-weight: 800; color: var(--primary); font-size: 1.2rem;">NEXTGEN SYSTEM</div>
        <div id="device-info" style="font-size: 0.8rem; color: #95a5a6;"></div>
    </header>

    <div class="layout">
        <main class="viewport">
            <div class="main-screen">
                <video id="main-video" autoplay playsinline muted></video>
                <div id="rec-tag" style="position:absolute; top:20px; left:20px; background:rgba(255,0,0,0.8); color:white; padding:5px 15px; border-radius:20px; font-size:0.7rem; display:none;">LIVE RECORDING</div>
            </div>
            <div id="thumb-list" class="thumb-list"></div>
        </main>

        <aside>
            <div class="status-box">
                <div id="ind" class="indicator"></div>
                <span id="stat-text">Ready</span>
            </div>

            <div id="master-ctrl" class="hidden">
                <div style="font-size: 0.8rem; margin-bottom: 8px;">一斉TTS送信:</div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="tts-msg" placeholder="喋らせる内容...">
                    <button class="btn btn-primary" style="margin:0; width:60px; padding:0;" onclick="broadcast()">送る</button>
                </div>
            </div>

            <div style="font-size: 0.8rem; margin: 20px 0 5px; color: #95a5a6;">ログ履歴:</div>
            <div id="log-box"></div>
        </aside>
    </div>
</div>

<canvas id="motion-canvas" width="160" height="120" style="display:none;"></canvas>

<script>
    const MASTER_ID = 'monitor-master-unit';
    let peer, myRole, myName;
    let connections = {};

    function addLog(m) {
        const d = document.getElementById('log-box');
        d.innerHTML = `<div style="margin-bottom:4px; border-bottom:1px solid #eee; padding-bottom:2px;">${m}</div>` + d.innerHTML;
    }

    async function launch(role) {
        myRole = role;
        if (role === 'camera') {
            myName = document.getElementById('cam-name-input').value || '不明なカメラ';
        } else {
            myName = 'メインモニター';
        }

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('device-info').textContent = `${myName} | ID: 待機中...`;

        initPeer();
    }

    function initPeer() {
        const id = (myRole === 'master') ? MASTER_ID : 'cam-' + Math.random().toString(36).substr(2, 6);
        peer = new Peer(id);

        peer.on('open', (id) => {
            document.getElementById('device-info').textContent = `${myName} | ID: ${id}`;
            document.getElementById('ind').classList.add('on');
            document.getElementById('stat-text').textContent = "オンライン";
            if (myRole === 'camera') startCamera();
            if (myRole === 'master') document.getElementById('master-ctrl').classList.remove('hidden');
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                // カメラ名を取得するためにメタデータを待つか、接続時のデータ送受信を利用
                addThumb(call.peer, stream);
            });
        });

        peer.on('connection', (conn) => {
            connections[conn.peer] = conn;
            conn.on('data', (data) => {
                if (data.type === 'init') {
                    const thumb = document.getElementById(`name-${conn.peer}`);
                    if (thumb) thumb.textContent = data.name;
                    addLog(`[接続] ${data.name} がオンラインになりました`);
                }
                if (data.type === 'alert') {
                    document.getElementById('ind').classList.add('alert');
                    document.getElementById('stat-text').textContent = `検知: ${data.name}`;
                    addLog(`⚠ ${data.name} で動きを検知、録画を開始しました`);
                }
                if (data.type === 'idle') {
                    document.getElementById('ind').classList.remove('alert');
                    document.getElementById('stat-text').textContent = "監視中";
                }
                if (data.type === 'tts') {
                    const u = new SpeechSynthesisUtterance(data.text);
                    u.lang = 'ja-JP';
                    window.speechSynthesis.speak(u);
                }
            });
        });
    }

    // --- カメラ側 ---
    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('main-video').srcObject = stream;
        
        const call = peer.call(MASTER_ID, stream);
        const conn = peer.connect(MASTER_ID);
        
        conn.on('open', () => {
            conn.send({ type: 'init', name: myName });
        });

        // 動体検知
        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        let prev = null;
        let recording = false;

        setInterval(() => {
            ctx.drawImage(document.getElementById('main-video'), 0, 0, canvas.width, canvas.height);
            const curr = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            if (prev) {
                let diff = 0;
                for (let i = 0; i < curr.length; i += 4) diff += Math.abs(curr[i] - prev[i]);
                if (diff > 35000 && !recording) {
                    recording = true;
                    conn.send({ type: 'alert', name: myName });
                    const rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    const chunks = [];
                    rec.ondataavailable = e => chunks.push(e.data);
                    rec.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${myName}_${Date.now()}.webm`;
                        a.click();
                        recording = false;
                        conn.send({ type: 'idle' });
                    };
                    rec.start();
                    setTimeout(() => rec.stop(), 10000);
                }
            }
            prev = curr;
        }, 800);
    }

    // --- モニター側 ---
    function addThumb(id, stream) {
        if (document.getElementById(`t-${id}`)) return;
        const list = document.getElementById('thumb-list');
        const card = document.createElement('div');
        card.id = `t-${id}`;
        card.className = 'thumb-card';
        card.innerHTML = `<video autoplay playsinline muted></video><div class="thumb-name" id="name-${id}">Loading...</div>`;
        
        const v = card.querySelector('video');
        v.srcObject = stream;
        
        card.onclick = () => {
            document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            const main = document.getElementById('main-video');
            main.srcObject = stream;
            main.play();
        };

        list.appendChild(card);
        if (list.children.length === 1) card.click();
    }

    function broadcast() {
        const txt = document.getElementById('tts-msg').value;
        if (!txt) return;
        Object.values(connections).forEach(c => c.send({ type: 'tts', text: txt }));
        addLog(`[TTS] 全員へ送信: ${txt}`);
        document.getElementById('tts-msg').value = '';
    }
</script>

</body>
</html>
