<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Monitor System</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .mode-select { display: flex; gap: 10px; justify-content: center; padding: 50px 0; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }
        .btn-pc { background: #00d1b2; }
        .btn-tab { background: #007bff; }
        
        /* モニターモードのスタイル */
        #monitor-ui, #camera-ui { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .v-wrap { background: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .log-box { height: 60px; overflow-y: auto; font-size: 11px; padding: 8px; background: #fafafa; border-top: 1px solid #eee; }
        .status { font-size: 12px; padding: 10px; background: #333; color: #fff; border-radius: 5px; margin-bottom: 10px; }
        
        /* カメラ側のスタイル */
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="mode-selection" class="mode-select">
        <button class="btn btn-pc" onclick="initCameraMode()">📷 この端末をカメラにする</button>
        <button class="btn btn-tab" onclick="initMonitorMode()">📱 この端末をモニターにする</button>
    </div>

    <div id="camera-ui">
        <div class="status" id="cam-status">準備中...</div>
        <video id="my-video" autoplay playsinline muted></video>
        <canvas id="comp-canvas"></canvas>
    </div>

    <div id="monitor-ui">
        <div class="status" id="mon-status">モニターモード待機中</div>
        <div class="grid" id="monitor-grid"></div>
    </div>

    <script>
    const MASTER_ID = 'my-unique-monitor-2026'; // あなた専用の固定ID（自由に変えてOK）
    let peer, localStream, connections = {}, isRecording = {};

    // --- 【共通】マイク・カメラ準備 ---
    async function getMedia(needVideo) {
        try {
            return await navigator.mediaDevices.getUserMedia({video: needVideo, audio: true});
        } catch (e) {
            console.warn("メディア取得失敗:", e);
            return new MediaStream();
        }
    }

    // --- 【モード1】カメラ側 (PC) ---
    async function initCameraMode() {
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('camera-ui').style.display = 'block';
        
        const myName = "unit-" + Math.floor(Math.random() * 1000);
        localStream = await getMedia(true);
        document.getElementById('my-video').srcObject = localStream;

        peer = new Peer(myName);
        peer.on('open', id => {
            document.getElementById('cam-status').innerText = "カメラ稼働中: " + id;
            startMotionDetection(); // 動体検知開始
            tryConnectToMonitor(); // モニターへ自分から通知
        });

        peer.on('call', call => call.answer(localStream)); // 映像を送る
    }

    // カメラからモニターへ自動通知
    function tryConnectToMonitor() {
        const conn = peer.connect(MASTER_ID);
        conn.on('open', () => {
            conn.send({ type: 'JOIN', id: peer.id });
            document.getElementById('cam-status').innerText += " (モニター接続済み)";
        });
        conn.on('close', () => setTimeout(tryConnectToMonitor, 10000));
    }

    // 動体検知ロジック
    function startMotionDetection() {
        const video = document.getElementById('my-video');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        let lastFrame;

        setInterval(() => {
            if (video.paused || video.ended) return;
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const currFrame = ctx.getImageData(0, 0, 64, 48).data;

            if (lastFrame) {
                let diff = 0;
                for (let i = 0; i < currFrame.length; i += 4) {
                    diff += Math.abs(currFrame[i] - lastFrame[i]);
                }
                if (diff > 200000) { // 敷居値
                    const conn = peer.connect(MASTER_ID);
                    if (conn.open) conn.send({ type: 'MOTION', time: new Date().toLocaleTimeString() });
                }
            }
            lastFrame = currFrame;
        }, 500);
    }

    // --- 【モード2】モニター側 (タブレット) ---
    async function initMonitorMode() {
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('monitor-ui').style.display = 'block';

        localStream = await getMedia(false); // モニターはマイクのみ
        peer = new Peer(MASTER_ID);

        peer.on('open', id => {
            document.getElementById('mon-status').innerText = "モニター受付中: " + id;
        });

        // カメラからの「JOIN」や「MOTION」を受信
        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.type === 'JOIN') {
                    addMonitorCard(data.id);
                } else if (data.type === 'MOTION') {
                    updateLog(conn.peer, data.time);
                }
            });
        });
    }

    function addMonitorCard(id) {
        if (document.getElementById(`card-${id}`)) return;
        const grid = document.getElementById('monitor-grid');
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <div class="v-wrap"><video id="v-${id}" autoplay playsinline></video></div>
            <div class="log-box" id="log-${id}">Unit: ${id} 待機中...</div>
        `;
        grid.appendChild(card);

        // 映像を要求
        const call = peer.call(id, localStream);
        call.on('stream', s => {
            document.getElementById(`v-${id}`).srcObject = s;
            connections[id] = s;
        });
    }

    function updateLog(id, time) {
        const log = document.getElementById(`log-${id}`);
        if (log) {
            log.innerHTML = `<div>● ${time} 動き検知・録画</div>` + log.innerHTML;
            if (connections[id]) startAutoRecord(id, connections[id]);
        }
    }

    function startAutoRecord(id, stream) {
        if (isRecording[id]) return;
        isRecording[id] = true;
        const mr = new MediaRecorder(stream);
        const chunks = [];
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
            const blob = new Blob(chunks, {type: 'video/webm'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `rec_${id}_${Date.now()}.webm`; a.click();
            isRecording[id] = false;
        };
        mr.start();
        setTimeout(() => mr.stop(), 10000); // 10秒録画
    }
    </script>
</body>
</html>
