<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PC Unit - Stable</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; }
        #log { color: #00d1b2; background: #000; padding: 10px; border-radius: 5px; margin: 10px; font-family: monospace; font-size: 14px; min-height: 20px; }
        .setup { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        video { width: 100%; max-width: 400px; border-radius: 10px; margin-top: 20px; border: 1px solid #333; background: #000; }
    </style>
</head>
<body>
    <h1>PC Unit</h1>
    <div id="log">準備完了</div>

    <div class="setup" id="setup-area">
        <input type="text" id="pc-id" value="pc-001" style="padding:10px;">
        <button onclick="startUnit()" style="padding:10px 20px; background:#00d1b2; border:none; color:white; font-weight:bold; cursor:pointer;">起動</button>
    </div>

    <div id="main-area" style="display:none;">
        <h2 id="name-display"></h2>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <script>
    let peer, localStream;
    const logDiv = document.getElementById('log');

    function updateLog(msg) { logDiv.innerText = msg; }

    async function startUnit() {
        const myId = document.getElementById('pc-id').value;
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('main-area').style.display = 'block';
        updateLog("デバイスをチェック中...");

        // 映像・音声の取得（失敗しても止まらないようにする）
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            updateLog("カメラ・マイク OK");
        } catch (e) {
            updateLog("カメラ/マイク制限ありで起動します");
            try {
                // マイクなし、映像のみ試行
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
            } catch (e2) {
                // 全部ダメなら空のストリーム
                localStream = new MediaStream();
            }
        }

        const video = document.getElementById('localVideo');
        video.srcObject = localStream;

        peer = new Peer(myId);

        peer.on('open', (id) => {
            updateLog("オンライン: " + id);
            document.getElementById('name-display').innerText = id;
        });

        peer.on('error', (err) => updateLog("エラー: " + err.type));

        peer.on('call', call => {
            call.answer(localStream);
            updateLog("タブレットと映像通話中");
            call.on('stream', rem => {
                const a = document.createElement('audio'); a.srcObject = rem; a.autoplay = true; document.body.appendChild(a);
            });
        });

        // データ通信（読み上げ用）
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(typeof data === 'string') window.speechSynthesis.speak(new SpeechSynthesisUtterance(data));
            });
        });
    }
    </script>
</body>
</html>
