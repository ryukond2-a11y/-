<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab System - Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .box { background: #222; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 50px; border: 1px solid #444; }
        .btn { padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; margin: 10px; font-size: 16px; transition: 0.2s; }
        .btn-pc { background: #00d1b2; }
        .btn-tab { background: #007bff; }
        .btn:active { transform: scale(0.95); }
        #log { margin-top: 20px; font-size: 13px; color: #888; min-height: 1.5em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #333; border-radius: 10px; overflow: hidden; text-align: left; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="box">
        <h2>システム開始</h2>
        <p>ボタンを押すとカメラ・マイクの確認が始まります</p>
        <button class="btn btn-pc" onclick="init('camera')">📷 カメラとして起動</button>
        <button class="btn btn-tab" onclick="init('monitor')">📱 モニターとして起動</button>
        <div id="log"></div>
    </div>

    <div id="main-ui" style="display:none;">
        <h3 id="status-text">起動中...</h3>
        <div class="grid" id="grid"></div>
        <video id="preview" autoplay playsinline muted style="width:200px; border-radius:10px; margin-top:10px;"></video>
    </div>

    <canvas id="comp-canvas"></canvas>

    <script>
    const SYNC_ID = 'ryukon-lab-sync-2026'; 
    let peer, localStream, myMode;

    function updateLog(msg) { document.getElementById('log').innerText = msg; }

    async function init(mode) {
        myMode = mode;
        updateLog("デバイスを呼び出し中...");

        // 🟢 ユーザーがボタンを押した「この瞬間」にだけ許可ダイアログは有効になります
        try {
            // モニターならマイクのみ、カメラなら両方
            const constraints = { video: (mode === 'camera'), audio: true };
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            
            if(mode === 'camera') {
                document.getElementById('preview').srcObject = localStream;
            }
            startPeer();
        } catch (e) {
            console.error(e);
            updateLog("エラー: カメラが見つからないか、拒否されました。設定を確認してリロードしてください。");
        }
    }

    function startPeer() {
        // モニターは固定ID、カメラはランダムID
        peer = (myMode === 'monitor') ? new Peer(SYNC_ID) : new Peer();

        peer.on('open', id => {
            document.getElementById('status-text').innerText = `${myMode}モード: ${id}`;
            if(myMode === 'camera') {
                setInterval(report, 5000); // モニターへ通知
                startMotion();
            }
        });

        // 映像が届いたとき（モニター側）
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                if(myMode === 'monitor') addCard(call.peer, stream);
            });
        });

        // 信号が届いたとき
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(myMode === 'monitor' && data.type === 'JOIN') addCard(data.id, null);
                if(myMode === 'monitor' && data.type === 'MOTION') alertMotion(data.id, data.time);
            });
        });
    }

    function report() {
        const conn = peer.connect(SYNC_ID);
        conn.on('open', () => conn.send({type: 'JOIN', id: peer.id}));
    }

    function addCard(id, stream) {
        let card = document.getElementById(`card-${id}`);
        if(!card) {
            card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <video id="v-${id}" autoplay playsinline></video>
                <div style="padding:10px;">
                    <strong>Unit: ${id}</strong><br>
                    <button onclick="document.getElementById('v-${id}').muted=false" style="margin-top:5px;">🔊 音声を出す</button>
                    <div id="log-${id}" style="font-size:11px; color:#aaa; margin-top:5px;">接続完了</div>
                </div>
            `;
            document.getElementById('grid').appendChild(card);
            peer.call(id, localStream);
        }
        if(stream) {
            const v = document.getElementById(`v-${id}`);
            v.srcObject = stream;
            v.play();
        }
    }

    function startMotion() {
        const video = document.getElementById('preview');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d');
        let last;
        setInterval(() => {
            if(video.videoWidth === 0) return;
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const curr = ctx.getImageData(0, 0, 64, 48).data;
            if(last) {
                let d = 0;
                for(let i=0; i<curr.length; i+=4) d += Math.abs(curr[i]-last[i]);
                if(d > 300000) {
                    const conn = peer.connect(SYNC_ID);
                    if(conn.open) conn.send({type: 'MOTION', id: peer.id, time: new Date().toLocaleTimeString()});
                }
            }
            last = curr;
        }, 1000);
    }

    function alertMotion(id, time) {
        const log = document.getElementById(`log-${id}`);
        if(log) log.innerHTML = `<div>⚠️ ${time} 動き検知</div>` + log.innerHTML;
    }
    </script>
</body>
</html>
