<!DOCTYPE html>
<html>
<head>
    <title>Camera-Side</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="my-video" style="width: 300px;" autoplay playsinline></video>
    <p>ID: <span id="my-id">...</span></p>

    <script>
        const peer = new Peer(); // ランダムなIDが生成される
        peer.on('open', id => document.getElementById('my-id').textContent = id);

        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                document.getElementById('my-video').srcObject = stream;
                // 受信側からの着信に応答する設定
                peer.on('call', call => {
                    call.answer(stream);
                });
            });
    </script>
</body>
</html>
