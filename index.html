<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Sync - Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #eee; margin: 0; padding: 10px; }
        .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .btn { padding: 20px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; font-size: 18px; margin: 10px; }
        .btn-pc { background: #00d1b2; }
        .btn-tab { background: #007bff; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; }
        
        /* 折り畳みメニュー */
        details { background: #222; border-top: 1px solid #444; }
        summary { padding: 12px; cursor: pointer; color: #00d1b2; font-weight: bold; }
        .controls { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        .ctrl-btn { padding: 12px; border: none; border-radius: 6px; background: #444; color: white; cursor: pointer; }

        .log-box { height: 80px; overflow-y: auto; font-size: 11px; padding: 10px; background: #050505; color: #00d1b2; font-family: monospace; border-top: 1px solid #333; }
        #preview { width: 150px; position: fixed; bottom: 10px; right: 10px; border: 2px solid #00d1b2; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <button class="btn btn-pc" onclick="start('camera')">📷 カメラとして起動(PC)</button>
        <button class="btn btn-tab" onclick="start('monitor')">📱 モニターとして起動(Tab)</button>
    </div>

    <div id="ui-area" style="display:none;">
        <div id="status" style="font-size:12px; color:#888; margin-bottom:10px;"></div>
        <div class="grid" id="grid"></div>
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <canvas id="comp-canvas" style="display:none;"></canvas>

    <script>
    const SYNC_ID = 'ryukon-lab-sync-2026'; 
    let peer, localStream, myMode, isRecording = {};

    async function start(mode) {
        myMode = mode;
        try {
            // デバイスエラー対策：失敗しても空のストリームで続行
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: (mode==='camera'), audio: true});
            } catch (mediaErr) {
                console.warn("デバイス取得失敗、映像なしで起動します:", mediaErr);
                localStream = new MediaStream(); 
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('ui-area').style.display = 'block';

            if(mode === 'camera') {
                const pre = document.getElementById('preview');
                pre.style.display = "block"; pre.srcObject = localStream;
            }

            peer = (mode === 'monitor') ? new Peer(SYNC_ID) : new Peer();

            peer.on('open', id => {
                document.getElementById('status').innerText = `Mode: ${mode} / ID: ${id}`;
                if(mode === 'camera') {
                    setInterval(() => {
                        const conn = peer.connect(SYNC_ID);
                        conn.on('open', () => conn.send({type:'JOIN', id: peer.id}));
                    }, 5000);
                    startMotion();
                }
            });

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => { if(myMode === 'monitor') addCard(call.peer, stream); });
            });

            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(myMode === 'monitor') {
                        if(data.type === 'JOIN') addCard(data.id, null);
                        if(data.type === 'MOTION') logMotion(data.id, data.time);
                    }
                });
            });

        } catch (e) { alert("システム起動エラー: " + e.message); }
    }

    function addCard(id, stream) {
        let card = document.getElementById(`card-${id}`);
        if(!card) {
            card = document.createElement('div');
            card.className = 'card'; card.id = `card-${id}`;
            card.innerHTML = `
                <video id="v-${id}" autoplay playsinline muted></video>
                <details>
                    <summary>操作メニュー</summary>
                    <div class="controls">
                        <button class="ctrl-btn" onclick="document.getElementById('v-${id}').muted=false">🔊 音を出す</button>
                        <button class="ctrl-btn" onclick="manualRec('${id}')">🔴 今すぐ録画(15秒)</button>
                    </div>
                </details>
                <div class="log-box" id="log-${id}">接続完了</div>
            `;
            document.getElementById('grid').appendChild(card);
            peer.call(id, localStream);
        }
        if(stream && stream.getTracks().length > 0) {
            const v = document.getElementById(`v-${id}`);
            v.srcObject = stream;
            v.play().catch(e => console.log("再生ブロック解除待ち"));
        }
    }

    function startMotion() {
        const video = document.getElementById('preview');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d');
        let last;
        setInterval(() => {
            if(!video.srcObject || video.videoWidth === 0) return;
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const curr = ctx.getImageData(0, 0, 64, 48).data;
            if(last) {
                let d = 0; for(let i=0; i<curr.length; i+=4) d += Math.abs(curr[i]-last[i]);
                if(d > 350000) {
                    const conn = peer.connect(SYNC_ID);
                    conn.on('open', () => conn.send({type:'MOTION', id:peer.id, time:new Date().toLocaleTimeString()}));
                }
            }
            last = curr;
        }, 1000);
    }

    function logMotion(id, time) {
        const l = document.getElementById(`log-${id}`);
        if(l) {
            l.innerHTML = `<div>⚠️ ${time} 動きを検知・録画中</div>` + l.innerHTML;
            const v = document.getElementById(`v-${id}`);
            if(v && v.srcObject) record(id, v.srcObject, 10000);
        }
    }

    function record(id, stream, ms) {
        if(isRecording[id] || !stream) return; isRecording[id] = true;
        const mr = new MediaRecorder(stream); const chunks = [];
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
            a.download = `rec_${id}_${Date.now()}.webm`; a.click();
            isRecording[id] = false;
        };
        mr.start(); setTimeout(() => { if(mr.state === "recording") mr.stop(); }, ms);
    }

    function manualRec(id) {
        const v = document.getElementById(`v-${id}`);
        if(v && v.srcObject) record(id, v.srcObject, 15000);
    }
    </script>
</body>
</html>
