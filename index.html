<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Sync System</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; text-align: center; }
        .setup-box { background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; margin-top: 50px; }
        .btn { padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; margin: 10px; font-size: 16px; }
        .btn-pc { background: #00d1b2; }
        .btn-tab { background: #007bff; }
        
        #ui-area { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left; }
        .v-wrap { background: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .log-box { height: 60px; overflow-y: auto; font-size: 11px; padding: 8px; background: #f9f9f9; border-radius: 5px; }
        .status-bar { padding: 10px; background: #333; color: #fff; border-radius: 8px; font-size: 13px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-box">
        <h2>システムを開始</h2>
        <p>役割を選んでください</p>
        <button class="btn btn-pc" onclick="start('camera')">📷 カメラとして使う</button>
        <button class="btn btn-tab" onclick="start('monitor')">📱 モニターとして使う</button>
    </div>

    <div id="ui-area">
        <div class="status-bar" id="status">準備中...</div>
        <div class="grid" id="main-grid"></div>
        <video id="local-dummy" autoplay playsinline muted style="width:100px; display:none;"></video>
        <canvas id="comp-canvas"></canvas>
    </div>

    <script>
    // ★重要：ここを自分だけの名前に変えてください（例：ryukon-lab-2026）
    const SYNC_ID = 'ryukon-lab-master-system'; 
    
    let peer, localStream, mode;
    let activeUnits = new Set();

    async function start(selectedMode) {
        mode = selectedMode;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('ui-area').style.display = 'block';
        
        // カメラ・マイクの起動
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: (mode==='camera'), audio: true});
            if(mode === 'camera') document.getElementById('local-dummy').srcObject = localStream;
        } catch (e) {
            console.log("メディア制限あり");
            localStream = new MediaStream();
        }

        // モニターなら固定ID、カメラならランダムID
        peer = (mode === 'monitor') ? new Peer(SYNC_ID) : new Peer();

        peer.on('open', id => {
            document.getElementById('status').innerText = `${mode}起動中: ${id}`;
            if(mode === 'camera') {
                // カメラ側：モニターを探して自分を登録
                setInterval(reportToMonitor, 5000); 
                startMotionDetection();
            }
        });

        // 共通：着信処理
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                if(mode === 'monitor') displayStream(call.peer, stream);
            });
        });

        // 共通：データ通信処理
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(mode === 'monitor' && data.type === 'JOIN') displayStream(data.id, null);
                if(mode === 'monitor' && data.type === 'MOTION') alertMotion(data.id, data.time);
            });
        });

        peer.on('error', err => {
            if(err.type === 'unavailable-id' && mode === 'monitor') {
                alert("既に別の端末がモニターとして起動しています。");
            }
        });
    }

    // カメラ側：モニターに「私はここにいるよ」と送り続ける
    function reportToMonitor() {
        const conn = peer.connect(SYNC_ID);
        conn.on('open', () => conn.send({type: 'JOIN', id: peer.id}));
    }

    // モニター側：カメラの枠を作る＆映像を呼ぶ
    function displayStream(id, stream) {
        if(!document.getElementById(`card-${id}`)) {
            const grid = document.getElementById('main-grid');
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="v-wrap"><video id="v-${id}" autoplay playsinline></video></div>
                <div class="controls">
                    <strong>Unit: ${id}</strong>
                    <button onclick="document.getElementById('v-${id}').muted=false">🔊 音を出す</button>
                    <div class="log-box" id="log-${id}">接続済み</div>
                </div>
            `;
            grid.appendChild(card);
            // モニターからカメラへ映像をリクエスト
            peer.call(id, localStream);
        }
        if(stream) {
            const v = document.getElementById(`v-${id}`);
            v.srcObject = stream;
            v.play();
        }
    }

    // 動体検知
    function startMotionDetection() {
        const video = document.getElementById('local-dummy');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d');
        let last;
        setInterval(() => {
            ctx.drawImage(video, 0, 0, 64, 48);
            const curr = ctx.getImageData(0, 0, 64, 48).data;
            if(last) {
                let d = 0;
                for(let i=0; i<curr.length; i+=4) d += Math.abs(curr[i]-last[i]);
                if(d > 300000) {
                    const conn = peer.connect(SYNC_ID);
                    if(conn.open) conn.send({type: 'MOTION', id: peer.id, time: new Date().toLocaleTimeString()});
                }
            }
            last = curr;
        }, 1000);
    }

    function alertMotion(id, time) {
        const log = document.getElementById(`log-${id}`);
        if(log) log.innerHTML = `<div>⚠️ ${time} 動き検知！</div>` + log.innerHTML;
    }
    </script>
</body>
</html>
