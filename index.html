<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neda Lab - Ultimate Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050505; --panel: #151515; --accent: #00d1b2; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; gap: 15px; }
        .btn { padding: 18px 35px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }
        .btn-pc { background: var(--accent); }
        .btn-tab { background: #007bff; }
        
        #ui-area { display: none; padding-bottom: 80px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; }
        .v-wrap { background: #000; aspect-ratio: 16/9; position: relative; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 読み込み中・ロック解除ボタン */
        .unlock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .unlock-overlay::after { content: "▶ 映像と音を開始"; color: white; font-weight: bold; border: 2px solid white; padding: 10px; border-radius: 5px; }

        details { border-top: 1px solid #333; background: #222; }
        summary { padding: 12px; cursor: pointer; color: var(--accent); font-weight: bold; list-style: none; }
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .ctrl-btn { padding: 10px; border: none; border-radius: 6px; background: #444; color: #fff; cursor: pointer; font-size: 12px; }
        
        .log-box { height: 80px; overflow-y: auto; font-size: 11px; padding: 8px; background: #000; color: #00ff00; font-family: monospace; border-top: 1px solid #222; }
        #preview { width: 160px; position: fixed; bottom: 10px; right: 10px; border: 2px solid var(--accent); border-radius: 8px; display: none; z-index: 100; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h1>Neda Lab System</h1>
        <button class="btn btn-pc" onclick="start('camera')">📷 カメラとして起動</button>
        <button class="btn btn-tab" onclick="start('monitor')">📱 モニターとして起動</button>
    </div>

    <div id="ui-area">
        <div id="stat" style="font-size:11px; color:#555; margin-bottom:10px;"></div>
        <div class="grid" id="grid"></div>
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <canvas id="comp-canvas"></canvas>

    <script>
    const MASTER_ID = 'ryukon-lab-sync-2026';
    let peer, localStream, myMode, isRecording = {};

    async function start(mode) {
        myMode = mode;
        try {
            // マイクとカメラを両方取得
            localStream = await navigator.mediaDevices.getUserMedia({video: (mode==='camera'), audio: true});
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('ui-area').style.display = 'block';

            if(mode === 'camera') {
                const pre = document.getElementById('preview');
                pre.style.display = "block"; pre.srcObject = localStream;
            }

            peer = (mode === 'monitor') ? new Peer(MASTER_ID) : new Peer();

            peer.on('open', id => {
                document.getElementById('stat').innerText = `ID: ${id} | Mode: ${mode}`;
                if(mode === 'camera') {
                    setInterval(() => {
                        const conn = peer.connect(MASTER_ID);
                        conn.on('open', () => conn.send({type: 'JOIN', id: peer.id}));
                    }, 5000);
                    startMotionDetection();
                }
            });

            // 映像・音声の着信
            peer.on('call', call => {
                call.answer(localStream); // 自分のマイク音声を相手に返す（双方向）
                call.on('stream', stream => { if(myMode === 'monitor') addCard(call.peer, stream); });
            });

            // データ着信（JOIN通知、動体検知、読み上げ）
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(myMode === 'monitor') {
                        if(data.type === 'JOIN') addCard(data.id, null);
                        if(data.type === 'MOTION') handleMotion(data.id, data.time);
                    }
                    if(data.type === 'TTS') speakText(data.text);
                });
            });

        } catch (e) { alert("デバイスエラー: " + e.message); }
    }

    function addCard(id, stream) {
        let card = document.getElementById(`card-${id}`);
        if(!card) {
            card = document.createElement('div');
            card.className = 'card'; card.id = `card-${id}`;
            card.innerHTML = `
                <div class="v-wrap" id="unlock-${id}" onclick="unlock('${id}')">
                    <video id="v-${id}" autoplay playsinline muted></video>
                    <div class="unlock-overlay" id="overlay-${id}"></div>
                </div>
                <div class="log-box" id="log-${id}">Unit: ${id} Connected.</div>
                <details>
                    <summary>LAB MENU</summary>
                    <div class="controls">
                        <button class="ctrl-btn" onclick="unlock('${id}')">🔊 音声・映像を同期</button>
                        <button class="ctrl-btn" onclick="sendTTS('${id}')">💬 このカメラに読み上げ送信</button>
                        <button class="ctrl-btn" onclick="manualRec('${id}')">🔴 手動録画 (15s)</button>
                    </div>
                </details>
            `;
            document.getElementById('grid').appendChild(card);
            peer.call(id, localStream);
        }
        if(stream) {
            const v = document.getElementById(`v-${id}`);
            v.srcObject = stream;
        }
    }

    // 「真っ暗」対策：ユーザーがクリックして再生を開始させる
    function unlock(id) {
        const v = document.getElementById(`v-${id}`);
        const overlay = document.getElementById(`overlay-${id}`);
        if(v) {
            v.muted = false;
            v.play();
            if(overlay) overlay.style.display = 'none';
        }
    }

    // 読み上げ送信
    function sendTTS(id) {
        const text = prompt("カメラ側で読み上げる文字を入力:");
        if(!text) return;
        const conn = peer.connect(id);
        conn.on('open', () => conn.send({type: 'TTS', text: text}));
    }

    // 読み上げ実行（ブラウザの機能を使用）
    function speakText(text) {
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ja-JP';
        window.speechSynthesis.speak(ut);
    }

    // 動体検知
    function startMotionDetection() {
        const video = document.getElementById('preview');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d');
        let last;
        setInterval(() => {
            if(video.videoWidth === 0) return;
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const curr = ctx.getImageData(0, 0, 64, 48).data;
            if(last) {
                let d = 0; for(let i=0; i<curr.length; i+=4) d += Math.abs(curr[i]-last[i]);
                if(d > 350000) {
                    const conn = peer.connect(MASTER_ID);
                    conn.on('open', () => conn.send({type: 'MOTION', id: peer.id, time: new Date().toLocaleTimeString()}));
                }
            }
            last = curr;
        }, 1000);
    }

    function handleMotion(id, time) {
        const log = document.getElementById(`log-${id}`);
        if(log) {
            log.innerHTML = `<div>⚠️ ${time} 動きを検知・自動保存</div>` + log.innerHTML;
            const v = document.getElementById(`v-${id}`);
            if(v && v.srcObject) record(id, v.srcObject, 10000);
        }
    }

    function record(id, stream, ms) {
        if(isRecording[id]) return; isRecording[id] = true;
        const mr = new MediaRecorder(stream); const chunks = [];
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
            a.download = `LabRec_${id}_${Date.now()}.webm`; a.click();
            isRecording[id] = false;
        };
        mr.start(); setTimeout(() => { if(mr.state==="recording") mr.stop(); }, ms);
    }

    function manualRec(id) {
        const v = document.getElementById(`v-${id}`);
        if(v && v.srcObject) record(id, v.srcObject, 15000);
    }
    </script>
</body>
</html>
