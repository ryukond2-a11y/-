<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neda Lab - Multi-Sync System</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #1a1a1a; --accent: #00d1b2; --text: #eee; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* 役割選択 */
        .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; gap: 20px; }
        .btn { padding: 20px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; font-size: 18px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-pc { background: var(--accent); }
        .btn-tab { background: #007bff; }
        .btn:active { transform: scale(0.95); }

        /* グリッドレイアウト */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .card { background: var(--panel); border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .v-wrap { background: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 折り畳みメニュー */
        details { border-top: 1px solid #333; }
        summary { padding: 12px; cursor: pointer; color: var(--accent); font-weight: bold; font-size: 14px; list-style: none; }
        summary::before { content: "⚙️ "; }
        .controls { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .ctrl-btn { padding: 10px; border: none; border-radius: 8px; background: #333; color: #fff; cursor: pointer; font-size: 12px; }
        .ctrl-btn:hover { background: #444; }
        
        /* ログ・通知 */
        .log-box { height: 90px; overflow-y: auto; font-size: 11px; padding: 10px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; border-top: 1px solid #222; }
        .motion-alert { position: absolute; top: 10px; right: 10px; background: rgba(255, 0, 0, 0.8); color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; animation: blink 1s infinite; display: none; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #preview { width: 180px; position: fixed; bottom: 20px; right: 20px; border: 2px solid var(--accent); border-radius: 10px; display: none; z-index: 100; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h1 style="margin-bottom:0;">Lab Master 2026</h1>
        <p style="color:#666; margin-top:5px;">Neda Physicochemical Research Institute</p>
        <button class="btn btn-pc" onclick="start('camera')">📷 監視カメラとして参加</button>
        <button class="btn btn-tab" onclick="start('monitor')">📱 集中管理モニターを起動</button>
    </div>

    <div id="ui-area" style="display:none;">
        <div id="status-bar" style="font-size:12px; color:#666; margin-bottom:15px; text-align:right;"></div>
        <div class="grid" id="grid"></div>
        <video id="preview" autoplay playsinline muted></video>
    </div>

    <canvas id="comp-canvas"></canvas>

    <script>
    // 識別用の固定ID
    const MASTER_ID = 'ryukon-lab-sync-2026';
    let peer, localStream, myMode, isRecording = {};

    async function start(mode) {
        myMode = mode;
        try {
            // カメラ/マイクの取得。失敗しても停止させない。
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: (mode==='camera'), audio: true});
            } catch (e) {
                console.warn("Media failed, using empty stream", e);
                localStream = new MediaStream();
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('ui-area').style.display = 'block';

            if(mode === 'camera') {
                const pre = document.getElementById('preview');
                pre.style.display = "block"; pre.srcObject = localStream;
            }

            // PeerJSの接続
            peer = (mode === 'monitor') ? new Peer(MASTER_ID) : new Peer();

            peer.on('open', id => {
                document.getElementById('status-bar').innerText = `NODE: ${id} | MODE: ${mode}`;
                if(mode === 'camera') {
                    // 5秒おきにモニターに自分の生存を通知（これで何台でも自動認識）
                    setInterval(() => {
                        const conn = peer.connect(MASTER_ID);
                        conn.on('open', () => conn.send({type: 'JOIN', id: peer.id}));
                    }, 5000);
                    startMotionDetection();
                }
            });

            // モニター側：着信時にカメラ枠を生成
            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => { if(myMode === 'monitor') addCameraCard(call.peer, stream); });
            });

            // モニター側：データ受信（JOIN通知や動体検知）
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if(myMode === 'monitor') {
                        if(data.type === 'JOIN') addCameraCard(data.id, null);
                        if(data.type === 'MOTION') triggerAlert(data.id, data.time);
                    }
                });
            });

        } catch (err) { alert("初期化エラー: " + err.message); }
    }

    function addCameraCard(id, stream) {
        let card = document.getElementById(`card-${id}`);
        if(!card) {
            card = document.createElement('div');
            card.className = 'card'; card.id = `card-${id}`;
            card.innerHTML = `
                <div class="v-wrap">
                    <video id="v-${id}" autoplay playsinline muted></video>
                    <div class="motion-alert" id="alert-${id}">REC ● MOTION</div>
                </div>
                <div class="log-box" id="log-${id}">[SYSTEM] Unit: ${id} Connected.</div>
                <details>
                    <summary>MENU / CONTROLS</summary>
                    <div class="controls">
                        <button class="ctrl-btn" onclick="document.getElementById('v-${id}').muted=false">🔊 音声モニタリング開始</button>
                        <button class="ctrl-btn" onclick="manualRecord('${id}')">🔴 手動録画保存 (15s)</button>
                    </div>
                </details>
            `;
            document.getElementById('grid').appendChild(card);
            peer.call(id, localStream);
        }
        if(stream && stream.getVideoTracks().length > 0) {
            const v = document.getElementById(`v-${id}`);
            v.srcObject = stream;
        }
    }

    // 動体検知ロジック (カメラ側で計算して結果だけ送る)
    function startMotionDetection() {
        const video = document.getElementById('preview');
        const canvas = document.getElementById('comp-canvas');
        const ctx = canvas.getContext('2d');
        let lastFrame;

        setInterval(() => {
            if(video.videoWidth === 0) return;
            canvas.width = 64; canvas.height = 48;
            ctx.drawImage(video, 0, 0, 64, 48);
            const currFrame = ctx.getImageData(0, 0, 64, 48).data;
            
            if(lastFrame) {
                let diff = 0;
                for(let i=0; i<currFrame.length; i+=4) {
                    diff += Math.abs(currFrame[i] - lastFrame[i]);
                }
                // 感度調整（300000前後が目安）
                if(diff > 350000) {
                    const conn = peer.connect(MASTER_ID);
                    conn.on('open', () => conn.send({type: 'MOTION', id: peer.id, time: new Date().toLocaleTimeString()}));
                }
            }
            lastFrame = currFrame;
        }, 1000);
    }

    // アラートと自動録画（モニター側）
    function triggerAlert(id, time) {
        const alertTag = document.getElementById(`alert-${id}`);
        const log = document.getElementById(`log-${id}`);
        if(alertTag) {
            alertTag.style.display = 'block';
            setTimeout(() => { alertTag.style.display = 'none'; }, 5000);
        }
        if(log) {
            log.innerHTML = `<div>[${time}] ⚠️ MOTION DETECTED - AUTO REC START</div>` + log.innerHTML;
            const stream = document.getElementById(`v-${id}`).srcObject;
            if(stream) autoRecord(id, stream, 10000); // 10秒自動録画
        }
    }

    function autoRecord(id, stream, ms) {
        if(isRecording[id]) return;
        isRecording[id] = true;
        const mr = new MediaRecorder(stream);
        const chunks = [];
        mr.ondataavailable = e => chunks.push(e.data);
        mr.onstop = () => {
            const blob = new Blob(chunks, {type: 'video/webm'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `Lab_AutoRec_${id}_${Date.now()}.webm`; a.click();
            isRecording[id] = false;
        };
        mr.start();
        setTimeout(() => { if(mr.state === "recording") mr.stop(); }, ms);
    }

    function manualRecord(id) {
        const s = document.getElementById(`v-${id}`).srcObject;
        if(s) autoRecord(id, s, 15000);
    }
    </script>
</body>
</html>
